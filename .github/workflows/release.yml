name: Release RPFramework

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to release (e.g. v0.1.0.0)"
                required: true
                default: "v0.1.0.0"

permissions:
    contents: write

jobs:
    build:
        runs-on: windows-2022

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Install .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: 10.0.x

            - name: Download Dalamud
              run: |
                  Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
                  Expand-Archive -Force dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

            - name: Build
              run: dotnet build RPFramework/RPFramework.csproj --configuration Release

            - name: Package
              run: |
                  $projName = 'RPFramework'
                  $binRoot = 'RPFramework/bin'
                  Write-Host "Searching for build output under $binRoot..."

                  # Prefer the directory that contains the project DLL
                  $target = Get-ChildItem -Path $binRoot -Recurse -Filter "$projName.dll" -File -ErrorAction SilentlyContinue | Select-Object -First 1
                  if ($target) {
                    $buildDir = $target.Directory.FullName
                  } else {
                    # Fallback to any dll/exe found
                    $target = Get-ChildItem -Path $binRoot -Recurse -Include '*.dll','*.exe' -File -ErrorAction SilentlyContinue | Select-Object -First 1
                    if ($target) { $buildDir = $target.Directory.FullName }
                  }

                  if (-not $buildDir) {
                    Write-Host "No project-specific output found; falling back to first Release directory"
                    $buildDir = Get-ChildItem -Path $binRoot -Recurse -Directory | Where-Object { $_.FullName -match '[/\\]Release' } | Select-Object -First 1 -ExpandProperty FullName
                  }

                  Write-Host "Using build output: $buildDir"
                  if (-not (Test-Path $buildDir)) {
                    Write-Error "Output directory $buildDir does not exist!"
                    exit 1
                  }
                  Get-ChildItem -Path $buildDir -Recurse

                  # Remove any existing latest.zip inside the build output to avoid nesting archives
                  Get-ChildItem -Path $buildDir -Recurse -Filter 'latest.zip' -File -ErrorAction SilentlyContinue | ForEach-Object {
                    Write-Host "Removing nested archive: $($_.FullName)"
                    Remove-Item -Path $_.FullName -Force -ErrorAction SilentlyContinue
                  }

                  # Create the zip outside the repo workspace to avoid including the archive inside itself
                  # Only zip files (not subdirectories) — the SDK creates a plugin-named subfolder with a
                  # duplicate manifest that we don't want included in the release zip.
                  $destTemp = Join-Path $env:RUNNER_TEMP 'latest.zip'
                  Write-Host "Creating zip at $destTemp"
                  $filesToZip = Get-ChildItem -Path $buildDir -File | Select-Object -ExpandProperty FullName
                  Compress-Archive -Path $filesToZip -DestinationPath $destTemp -Force

                  # Copy the artifact into the workspace for the release action to pick it up
                  Copy-Item -Path $destTemp -Destination (Join-Path $env:GITHUB_WORKSPACE 'latest.zip') -Force
                  Write-Host "Copied artifact to $env:GITHUB_WORKSPACE\latest.zip"

            - name: Resolve tag
              id: tag
              run: |
                  if ("${{ github.ref_type }}" -eq "tag") {
                    echo "value=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
                  } else {
                    echo "value=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
                  }

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.value }}
                  files: latest.zip
                  generate_release_notes: true

            - name: Delete old releases
              uses: actions/github-script@v7
              with:
                  script: |
                      const currentTag = '${{ steps.tag.outputs.value }}';
                      const { data: releases } = await github.rest.repos.listReleases({
                          owner: context.repo.owner,
                          repo:  context.repo.repo,
                          per_page: 100,
                      });
                      for (const release of releases) {
                          if (release.tag_name === currentTag) continue;
                          console.log(`Deleting release: ${release.tag_name} (id ${release.id})`);
                          await github.rest.repos.deleteRelease({
                              owner:      context.repo.owner,
                              repo:       context.repo.repo,
                              release_id: release.id,
                          });
                          try {
                              await github.rest.git.deleteRef({
                                  owner: context.repo.owner,
                                  repo:  context.repo.repo,
                                  ref:   `tags/${release.tag_name}`,
                              });
                          } catch (e) {
                              console.log(`Tag ${release.tag_name} already gone or not deletable: ${e.message}`);
                          }
                      }
